name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build Image
        run: docker build -t USERNAME/flask-k3s-demo:latest .

      - name: Push Image
        run: docker push USERNAME/flask-k3s-demo:latest
