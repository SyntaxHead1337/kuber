apiVersion: v1
kind: Service
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - protocol: TCP
      port: 8080       # Port im Cluster
      targetPort: 8080 # Port im Pod
      nodePort: 32080  # Port auf deinem Rechner/Node
